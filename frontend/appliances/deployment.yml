apiVersion: apps/v1
kind: Deployment
metadata:
  name: appliances-deployment
  labels:
    app: appliances
spec:
  replicas: 2
  selector:
    matchLabels:
      app: appliances
  template:
    metadata:
      labels:
        app: appliances
    spec:
      containers:
      - name: appliances
        image: 851725450272.dkr.ecr.us-east-1.amazonaws.com/shopping-site-appliances:096de00dc9f7db8168d03507c5cd70c19f9466ba
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: appliances-service
  labels:
    app: appliances
spec:
  type: ClusterIP
  selector:
    app: appliances
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
